<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Agenda GF">
<meta name="theme-color" content="#0a0e17">
<link rel="manifest" href="manifest.json">
<title>Agenda GF — Instituto Reaction</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e17;--surface:#111827;--surface2:#1a2235;--surface3:#0f1929;
  --border:rgba(255,255,255,0.07);--accent:#00d4ff;--accent2:#0099cc;
  --green:#10b981;--yellow:#f59e0b;--red:#ef4444;--orange:#f97316;
  --text:#e2e8f0;--muted:#64748b;--muted2:#94a3b8;
  --clinica:#0ea5e9;--personal:#a855f7;--home:#10b981;--online:#f59e0b;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);}

/* ── SCREENS ── */
.screen{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden;}
.screen.active{display:flex;}

/* ── LOGIN ── */
#loginScreen{background:var(--bg);align-items:center;justify-content:center;padding:24px;}
#loginScreen::before{content:'';position:absolute;top:-100px;left:50%;transform:translateX(-50%);
  width:500px;height:400px;background:radial-gradient(ellipse,rgba(0,212,255,0.08),transparent 70%);pointer-events:none;}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;
  padding:36px 32px;width:100%;max-width:380px;animation:fadeUp .4s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.login-avatar{width:72px;height:72px;border-radius:50%;object-fit:cover;object-position:top;
  border:2px solid var(--accent);display:block;margin:0 auto 16px;}
.login-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;text-align:center;margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:28px;}
.login-tabs{display:flex;gap:6px;background:var(--surface2);border-radius:10px;padding:4px;margin-bottom:24px;}
.login-tab{flex:1;padding:8px;border-radius:7px;border:none;cursor:pointer;font-family:'Syne',sans-serif;
  font-weight:700;font-size:13px;background:transparent;color:var(--muted);transition:all .2s;}
.login-tab.active{background:var(--accent);color:#000;}
.form-lbl{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.form-inp{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);
  padding:12px 14px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;outline:none;
  transition:border-color .2s;margin-bottom:14px;-webkit-appearance:none;}
.form-inp:focus{border-color:var(--accent);}
.btn-login{width:100%;background:var(--accent);color:#000;border:none;padding:14px;border-radius:10px;
  font-family:'Syne',sans-serif;font-weight:800;font-size:15px;cursor:pointer;transition:all .2s;margin-top:4px;}
.btn-login:hover{background:var(--accent2);}
.login-err{color:var(--red);font-size:13px;text-align:center;margin-top:10px;display:none;}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;
  padding-top:calc(12px + var(--safe-top));background:rgba(10,14,23,.97);
  border-bottom:1px solid var(--border);backdrop-filter:blur(12px);flex-shrink:0;z-index:50;}
.topbar-brand{display:flex;align-items:center;gap:10px;}
.topbar-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;object-position:top;border:1.5px solid var(--accent);}
.topbar-name{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;letter-spacing:-.3px;}
.topbar-name span{color:var(--accent);}
.topbar-sub{font-size:10px;color:var(--muted);margin-top:1px;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.icon-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);
  width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:16px;transition:all .2s;flex-shrink:0;}
.icon-btn:hover{background:var(--surface2);}

/* ── BOTTOM NAV ── */
.bottom-nav{display:flex;background:rgba(10,14,23,.97);border-top:1px solid var(--border);
  padding-bottom:calc(8px + var(--safe-bot));flex-shrink:0;}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 6px;
  background:none;border:none;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;
  font-size:10px;font-weight:500;transition:color .2s;}
.bnav-btn.active{color:var(--accent);}
.bnav-icon{font-size:20px;line-height:1;}

/* ── SCROLL CONTENT ── */
.scroll-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.page{display:none;padding:16px;}
.page.active{display:block;}

/* ══════════════════════════════
   TRAINER VIEWS
══════════════════════════════ */
.week-nav-bar{display:flex;align-items:center;gap:10px;padding:10px 16px;
  border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.wnav-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);
  width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;}
.wnav-label{flex:1;text-align:center;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;}
.today-btn{background:var(--surface2);border:1px solid var(--border);color:var(--accent);
  padding:6px 12px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap;}

/* stats strip */
.stats-strip{display:flex;gap:8px;padding:10px 16px;overflow-x:auto;border-bottom:1px solid var(--border);flex-shrink:0;}
.stat-chip{background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:7px 12px;display:flex;flex-direction:column;align-items:center;min-width:68px;gap:1px;}
.stat-val{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;line-height:1;}
.stat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}

/* day pills */
.day-pills{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;flex-shrink:0;border-bottom:1px solid var(--border);}
.day-pill{display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:8px 12px;border-radius:10px;cursor:pointer;transition:all .2s;min-width:52px;
  background:var(--surface);border:1px solid var(--border);}
.day-pill.active{background:rgba(0,212,255,.15);border-color:var(--accent);}
.day-pill.today{border-color:rgba(0,212,255,.4);}
.dp-name{font-family:'Syne',sans-serif;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.06em;}
.dp-date{font-size:10px;color:var(--muted);}
.day-pill.active .dp-name{color:var(--accent);}
.dp-count{font-size:9px;background:var(--accent);color:#000;border-radius:10px;
  padding:1px 5px;font-weight:700;display:none;}
.day-pill.active .dp-count{display:block;}

/* slot cards */
.slot-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:all .2s;position:relative;}
.slot-card:hover{border-color:var(--accent);transform:translateY(-1px);}
.slot-card.cancelled{opacity:.45;text-decoration:line-through;}
.slot-card.clinica{border-left:3px solid var(--clinica);}
.slot-card.personal{border-left:3px solid var(--personal);}
.slot-card.home{border-left:3px solid var(--home);}
.slot-card.online{border-left:3px solid var(--online);}
.slot-card.livre{border-left:3px solid var(--muted);opacity:.7;}
.slot-top{display:flex;align-items:center;gap:10px;}
.slot-time-badge{font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:var(--accent);min-width:44px;}
.slot-info{flex:1;}
.slot-name{font-weight:500;font-size:14px;line-height:1.3;}
.slot-meta{font-size:11px;color:var(--muted);margin-top:2px;display:flex;gap:8px;align-items:center;}
.type-badge{font-size:9px;text-transform:uppercase;letter-spacing:.05em;padding:2px 6px;border-radius:4px;}
.tb-clinica{background:rgba(14,165,233,.2);color:#38bdf8;}
.tb-personal{background:rgba(168,85,247,.2);color:#c084fc;}
.tb-home{background:rgba(16,185,129,.2);color:#34d399;}
.tb-online{background:rgba(245,158,11,.2);color:#fbbf24;}
.vagas-badge{display:flex;align-items:center;gap:3px;font-size:11px;}
.vaga-dot{width:8px;height:8px;border-radius:50%;}
.vaga-dot.filled{background:var(--accent);}
.vaga-dot.empty{background:var(--surface2);border:1px solid var(--border);}
.slot-note{font-size:11px;color:var(--muted);font-style:italic;margin-top:6px;padding-top:6px;border-top:1px solid var(--border);}
.add-slot-card{background:transparent;border:1px dashed var(--border);border-radius:12px;
  padding:12px;text-align:center;color:var(--muted);font-size:13px;cursor:pointer;transition:all .2s;margin-bottom:8px;}
.add-slot-card:hover{border-color:var(--accent);color:var(--accent);}

/* ══════════════════════════════
   STUDENT VIEW
══════════════════════════════ */
.student-hero{background:linear-gradient(135deg,var(--surface),var(--surface2));
  border-bottom:1px solid var(--border);padding:20px 16px;}
.student-greeting{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:4px;}
.student-greeting span{color:var(--accent);}
.student-sub{font-size:13px;color:var(--muted);}
.my-bookings-strip{padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);}
.strip-title{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;margin-bottom:10px;color:var(--muted2);}
.booking-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(0,212,255,.1);
  border:1px solid rgba(0,212,255,.25);border-radius:8px;padding:6px 10px;margin-right:6px;margin-bottom:6px;font-size:12px;}
.booking-chip-cancel{background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;padding:0 0 0 4px;}
.avail-section{padding:12px 16px;}
.avail-title{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;margin-bottom:12px;}
.avail-day-group{margin-bottom:20px;}
.avail-day-label{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;text-transform:uppercase;
  letter-spacing:.08em;color:var(--accent);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.avail-day-label::after{content:'';flex:1;height:1px;background:var(--border);}
.avail-slot{background:var(--surface);border:1px solid var(--border);border-radius:11px;
  padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s;}
.avail-slot:hover:not(.full):not(.booked){border-color:var(--green);background:rgba(16,185,129,.05);}
.avail-slot.booked{border-color:var(--accent);background:rgba(0,212,255,.08);}
.avail-slot.full{opacity:.5;cursor:not-allowed;}
.avail-time{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;color:var(--accent);min-width:46px;}
.avail-info{flex:1;}
.avail-name{font-size:13px;font-weight:500;}
.avail-vagas{font-size:11px;color:var(--muted);margin-top:2px;}
.avail-action{font-size:12px;font-weight:700;padding:6px 12px;border-radius:7px;border:none;cursor:pointer;transition:all .2s;}
.avail-action.book{background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.3);}
.avail-action.book:hover{background:rgba(16,185,129,.3);}
.avail-action.booked-btn{background:rgba(0,212,255,.1);color:var(--accent);border:1px solid rgba(0,212,255,.25);}
.avail-action.full-btn{background:var(--surface2);color:var(--muted);border:1px solid var(--border);cursor:not-allowed;}

/* history */
.hist-item{background:var(--surface);border:1px solid var(--border);border-radius:11px;
  padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.hist-date{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--accent);min-width:80px;}
.hist-info{flex:1;}
.hist-name{font-size:13px;font-weight:500;}
.hist-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.hist-status{font-size:11px;padding:3px 8px;border-radius:6px;}
.hist-done{background:rgba(16,185,129,.15);color:var(--green);}
.hist-cancel{background:rgba(239,68,68,.15);color:var(--red);}

/* ══════════════════════════════
   TRAINER — STUDENTS MANAGEMENT
══════════════════════════════ */
.student-list-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s;}
.student-list-item:hover{border-color:var(--accent);}
.student-avatar-placeholder{width:38px;height:38px;border-radius:50%;background:rgba(0,212,255,.15);
  border:1px solid rgba(0,212,255,.3);display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-weight:800;font-size:15px;color:var(--accent);flex-shrink:0;}
.student-list-info{flex:1;}
.student-list-name{font-weight:600;font-size:14px;}
.student-list-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.student-list-badge{font-size:11px;padding:3px 8px;border-radius:6px;background:rgba(0,212,255,.1);color:var(--accent);}

/* ══════════════════════════════
   MODALS
══════════════════════════════ */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;
  align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;}
.modal-sheet{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:520px;
  max-height:92vh;overflow-y:auto;padding:20px 20px calc(20px + var(--safe-bot));animation:slideUp .3s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px;}
.modal-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;margin-bottom:16px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-grp{margin-bottom:12px;}
.btn-full{width:100%;padding:13px;border-radius:10px;font-family:'Syne',sans-serif;font-weight:800;
  font-size:14px;cursor:pointer;border:none;transition:all .2s;margin-top:8px;}
.btn-primary2{background:var(--accent);color:#000;}
.btn-danger2{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)!important;}
.btn-ghost{background:var(--surface2);color:var(--muted);border:1px solid var(--border)!important;}
.detail-row{display:flex;justify-content:space-between;padding:9px 12px;background:var(--surface2);
  border-radius:8px;margin-bottom:6px;}
.detail-key{font-size:12px;color:var(--muted);}
.detail-val{font-size:13px;font-weight:500;}

/* TOAST */
.toast{position:fixed;bottom:calc(80px + var(--safe-bot));left:50%;transform:translateX(-50%);
  background:var(--surface2);border:1px solid var(--border);color:var(--text);
  padding:10px 18px;border-radius:10px;font-size:13px;z-index:999;white-space:nowrap;
  display:none;animation:toastIn .3s ease;}
.toast.show{display:block;}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

::-webkit-scrollbar{width:0;height:0;}
.section-empty{text-align:center;padding:40px 20px;color:var(--muted);}
.section-empty-icon{font-size:40px;margin-bottom:12px;}
.section-empty-text{font-size:14px;}
</style>
</head>

const DAY_KEYS=['seg','ter','qua','qui','sex','sab','dom'];
const DAY_NAMES=['Segunda','Terça','Quarta','Quinta','Sexta','Sábado','Domingo'];
const DAY_SHORT=['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];

// ══════════════════════════════
// DATE HELPERS
// ══════════════════════════════
function getMon(offset=0){
  const n=new Date();const day=n.getDay();
  const diff=n.getDate()-((day===0?7:day)-1);
  const m=new Date(n.setDate(diff+offset*7));m.setHours(0,0,0,0);return m;
}
function dkey(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function isToday(d){const t=new Date();return d.toDateString()===t.toDateString();}
function fmtDate(d){return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});}
function fmtDateFull(d){return d.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short'});}

function uid(){return Math.random().toString(36).slice(2,10);}

// Ensure slots exist for a date
function ensureSlots(dk,dow){
  if(!DB.slots[dk]){
    const dayKey=DAY_KEYS[dow===0?6:dow-1];
    const tmpl=DEFAULT_WEEK[dayKey]||[];
    DB.slots[dk]=tmpl.map(s=>({id:uid(),time:s.time,name:s.name,type:s.type,vagas:s.vagas||4,booked:[],note:'',status:'active'}));
    save(DB);
  }
  return DB.slots[dk];
}

let loginMode='trainer';

  loginMode=m;

function doLogin(){
  const u=document.getElementById('loginUser').value.trim().toLowerCase();
  const p=document.getElementById('loginPass').value;
  document.getElementById('loginErr').style.display='none';
  if(loginMode==='trainer'){

function showErr(){document.getElementById('loginErr').style.display='block';}

let trainerWeekOffset=0;
let selectedDayIndex=0;
let activeSlotId=null;
let addContext=null;

function trainerNav(d){trainerWeekOffset+=d;renderTrainer();}
function trainerGoToday(){trainerWeekOffset=0;selectedDayIndex=new Date().getDay();if(selectedDayIndex===0)selectedDayIndex=6;else selectedDayIndex--;renderTrainer();}

function renderTrainer(){
  const mon=getMon(trainerWeekOffset);
  const days=[];
  for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(d.getDate()+i);days.push(d);}
  document.getElementById('trainerWeekLabel').textContent=`${fmtDate(days[0])} — ${fmtDate(days[6])}`;

  // Stats
  let total=0,cli=0,per=0,hom=0,onl=0;
  days.forEach(d=>{
    const slots=ensureSlots(dkey(d),d.getDay());
    slots.forEach(s=>{
      if(s.status==='cancelled'||s.type==='livre')return;
      total++;if(s.type==='clinica')cli++;else if(s.type==='personal')per++;else if(s.type==='home')hom++;else if(s.type==='online')onl++;
    });
  });
  document.getElementById('trainerStats').innerHTML=`
    <div class="stat-chip"><div class="stat-val" style="color:var(--accent)">${total}</div><div class="stat-lbl">Total</div></div>
    <div class="stat-chip"><div class="stat-val" style="color:var(--clinica)">${cli}</div><div class="stat-lbl">Clínica</div></div>
    <div class="stat-chip"><div class="stat-val" style="color:var(--personal)">${per}</div><div class="stat-lbl">Personal</div></div>
    <div class="stat-chip"><div class="stat-val" style="color:var(--home)">${hom}</div><div class="stat-lbl">Home</div></div>
    <div class="stat-chip"><div class="stat-val" style="color:var(--online)">${onl}</div><div class="stat-lbl">Online</div></div>
  `;

  // Day pills
  const pillsEl=document.getElementById('dayPills');
  pillsEl.innerHTML='';
  days.forEach((d,i)=>{
    const dk=dkey(d);
    const slots=DB.slots[dk]||[];
    const count=slots.filter(s=>s.status==='active'&&s.type!=='livre').length;
    const pill=document.createElement('div');
    pill.className='day-pill'+(i===selectedDayIndex?' active':'')+(isToday(d)?' today':'');
    pill.innerHTML=`<div class="dp-name">${DAY_SHORT[i]}</div><div class="dp-date">${d.getDate()}</div><div class="dp-count">${count}</div>`;
    pill.onclick=()=>{selectedDayIndex=i;renderTrainer();};
    pillsEl.appendChild(pill);
  });

  renderSlots(days[selectedDayIndex]);
  renderStudentsList();
}

function renderSlots(d){
  const dk=dkey(d);
  const slots=ensureSlots(dk,d.getDay());
  const el=document.getElementById('slotsList');
  el.innerHTML=`<div style="font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;">${fmtDateFull(d)}</div>`;
  if(slots.length===0){el.innerHTML+=`<div class="section-empty"><div class="section-empty-icon">😴</div><div class="section-empty-text">Nenhum horário</div></div>`;return;}
  slots.sort((a,b)=>a.time.localeCompare(b.time));
  slots.forEach(s=>{
    const card=document.createElement('div');
    card.className=`slot-card ${s.type}${s.status==='cancelled'?' cancelled':''}`;
    const bookedNames=s.booked.map(bid=>{const st=DB.students.find(x=>x.id===bid);return st?st.name.split(' ')[0]:'?';}).join(', ');
    const vagasBadge=s.type==='clinica'?`
      <div class="vagas-badge">
        ${Array.from({length:s.vagas},(_,i)=>`<div class="vaga-dot ${i<s.booked.length?'filled':'empty'}"></div>`).join('')}
        <span style="font-size:10px;color:var(--muted);margin-left:3px">${s.booked.length}/${s.vagas}</span>
      </div>`:
      s.booked.length?`<span style="font-size:10px;color:var(--accent)">● Agendado</span>`:'';
    card.innerHTML=`
      <div class="slot-top">
        <div class="slot-time-badge">${s.time}</div>
        <div class="slot-info">
          <div class="slot-name">${s.name}</div>
          <div class="slot-meta"><span class="type-badge tb-${s.type}">${s.type}</span>${vagasBadge}</div>
          ${bookedNames?`<div style="font-size:11px;color:var(--accent);margin-top:4px">👤 ${bookedNames}</div>`:''}
        </div>
      </div>
      ${s.note?`<div class="slot-note">📝 ${s.note}</div>`:''}
    `;
    card.onclick=()=>openSlotModal(dk,s.id);
    el.appendChild(card);
  });
  const addBtn=document.createElement('div');
  addBtn.className='add-slot-card';addBtn.textContent='+ Adicionar horário';
  addBtn.onclick=()=>openAddModal(dk);
  el.appendChild(addBtn);
}

function openSlotModal(dk,slotId){
  const slots=DB.slots[dk];if(!slots)return;
  const s=slots.find(x=>x.id===slotId);if(!s)return;
  activeSlotId={dk,slotId};
  document.getElementById('slotModalTitle').textContent=`${s.time} — ${s.name}`;
  const bookedStudents=s.booked.map(bid=>{const st=DB.students.find(x=>x.id===bid);return st?st.name:'Desconhecido';});
  document.getElementById('slotModalBody').innerHTML=`
    <div class="detail-row"><span class="detail-key">Tipo</span><span class="detail-val"><span class="type-badge tb-${s.type}">${s.type}</span></span></div>
    <div class="detail-row"><span class="detail-key">Status</span><span class="detail-val">${s.status==='active'?'✅ Ativo':'❌ Cancelado'}</span></div>
    ${s.type==='clinica'?`<div class="detail-row"><span class="detail-key">Vagas</span><span class="detail-val">${s.booked.length}/${s.vagas}</span></div>`:''}
    ${bookedStudents.length?`<div class="detail-row"><span class="detail-key">Agendados</span><span class="detail-val" style="font-size:12px;text-align:right;max-width:200px">${bookedStudents.join(', ')}</span></div>`:''}
    <div class="form-grp" style="margin-top:10px"><label class="form-lbl">Observação</label><input type="text" class="form-inp" id="modalNote" value="${s.note||''}" placeholder="Adicione uma nota..."></div>
  `;
  const acts=document.getElementById('slotModalActions');
  acts.innerHTML='';
  const saveBtn=document.createElement('button');saveBtn.className='btn-full btn-primary2';saveBtn.textContent='Salvar nota';
  saveBtn.onclick=()=>{const n=document.getElementById('modalNote').value;s.note=n;save(DB);closeModal('slotModal');renderSlots(new Date(dk+'T12:00:00'));showToast('Salvo!');};
  acts.appendChild(saveBtn);
  if(s.status==='active'){
    const cancelBtn=document.createElement('button');cancelBtn.className='btn-full btn-danger2';cancelBtn.textContent='Cancelar horário';
    cancelBtn.onclick=()=>{s.status='cancelled';save(DB);closeModal('slotModal');renderTrainer();showToast('Horário cancelado.');};
    acts.appendChild(cancelBtn);
  } else {
    const reactBtn=document.createElement('button');reactBtn.className='btn-full btn-primary2';reactBtn.textContent='Reativar horário';
    reactBtn.onclick=()=>{s.status='active';save(DB);closeModal('slotModal');renderTrainer();showToast('Reativado!');};
    acts.appendChild(reactBtn);
  }
  const delBtn=document.createElement('button');delBtn.className='btn-full btn-ghost';delBtn.textContent='Excluir horário';
  delBtn.onclick=()=>{DB.slots[dk]=DB.slots[dk].filter(x=>x.id!==slotId);save(DB);closeModal('slotModal');renderTrainer();showToast('Excluído.');};
  acts.appendChild(delBtn);
  document.getElementById('slotModal').classList.add('open');
}

function openAddModal(dk){
  addContext=dk;
  document.getElementById('addTime').value='';
  document.getElementById('addName').value='';
  document.getElementById('addType').value='clinica';
  document.getElementById('addNote').value='';

}
function saveAddSlot(){
  const time=document.getElementById('addTime').value;
  const name=document.getElementById('addName').value.trim();
  const type=document.getElementById('addType').value;
  const vagas=parseInt(document.getElementById('addVagas').value)||4;
  const note=document.getElementById('addNote').value.trim();
  if(!time||!name){showToast('Preencha horário e nome.');return;}
  if(!DB.slots[addContext])DB.slots[addContext]=[];
  DB.slots[addContext].push({id:uid(),time,name,type,vagas,booked:[],note,status:'active'});
  save(DB);closeModal('addModal');renderTrainer();showToast('Horário adicionado!');
}

function renderStudentsList(){

function openAddStudentModal(){
  document.getElementById('newStudentName').value='';
  document.getElementById('newStudentUser').value='';
  document.getElementById('newStudentPass').value='';
  document.getElementById('newStudentWA').value='';
  document.getElementById('addStudentModal').classList.add('open');
}
function saveNewStudent(){
  const name=document.getElementById('newStudentName').value.trim();
  const user=document.getElementById('newStudentUser').value.trim().toLowerCase();
  const pass=document.getElementById('newStudentPass').value.trim();
  const wa=document.getElementById('newStudentWA').value.trim();
  if(!name||!user||!pass){showToast('Preencha nome, usuário e senha.');return;}
  if(pass.length<4){showToast('Senha mínimo 4 caracteres.');return;}
  if(DB.students.find(s=>s.user===user)){showToast('Usuário já existe.');return;}
  DB.students.push({id:uid(),name,user,pass,wa});
  save(DB);closeModal('addStudentModal');renderStudentsList();showToast(`${name} cadastrado!`);
}

// STUDENT
// ══════════════════════════════
let pendingBook=null;

function renderStudent(){
  renderMyBookings();
  renderAvail();
}

function renderMyBookings(){
  const el=document.getElementById('myBookingsStrip');
  const myActive=DB.bookings.filter(b=>b.studentId===currentUser.studentId&&b.status==='active');
  if(!myActive.length){el.innerHTML='';return;}
  el.innerHTML=`<div class="strip-title">Meus agendamentos ativos</div>`;
  myActive.forEach(b=>{
    const chip=document.createElement('div');chip.className='booking-chip';
    chip.innerHTML=`📅 <strong>${b.dateKey}</strong> às ${b.time} — ${b.slotName}<button class="booking-chip-cancel" onclick="cancelBooking('${b.id}')">✕</button>`;
    el.appendChild(chip);
  });
}

function renderAvail(){
  const el=document.getElementById('availSlots');
  el.innerHTML='';
  const today=new Date();today.setHours(0,0,0,0);
  const myBookedSlotIds=new Set(DB.bookings.filter(b=>b.studentId===currentUser.studentId&&b.status==='active').map(b=>b.slotId));

  // Show next 14 days
  let hasAny=false;
  for(let i=0;i<14;i++){
    const d=new Date(today);d.setDate(d.getDate()+i);
    if(d.getDay()===0)continue; // skip sunday
    const dk=dkey(d);
    const slots=ensureSlots(dk,d.getDay()).filter(s=>s.status==='active'&&s.type!=='livre'&&s.vagas>0);
    if(!slots.length)continue;
    hasAny=true;
    const grp=document.createElement('div');grp.className='avail-day-group';
    grp.innerHTML=`<div class="avail-day-label">${DAY_NAMES[d.getDay()===0?6:d.getDay()-1]}, ${fmtDate(d)}</div>`;
    slots.sort((a,b)=>a.time.localeCompare(b.time));
    slots.forEach(s=>{
      const isFull=s.booked.length>=s.vagas;
      const isBooked=myBookedSlotIds.has(s.id);
      const row=document.createElement('div');
      row.className=`avail-slot${isBooked?' booked':isFull?' full':''}`;
      const vagasTxt=s.type==='clinica'?`${s.vagas-s.booked.length} vaga(s) livre(s)`:isBooked?'Agendado':'Disponível';
      let actionBtn='';
      if(isBooked)actionBtn=`<button class="avail-action booked-btn" disabled>✓ Agendado</button>`;
      else if(isFull)actionBtn=`<button class="avail-action full-btn" disabled>Lotado</button>`;
      else actionBtn=`<button class="avail-action book" onclick="openBookModal('${dk}','${s.id}');event.stopPropagation()">Agendar</button>`;
      row.innerHTML=`
        <div class="avail-time">${s.time}</div>
        <div class="avail-info">
          <div class="avail-name">${s.name}</div>
          <div class="avail-vagas">${vagasTxt}</div>
        </div>
        ${actionBtn}
      `;
      grp.appendChild(row);
    });
    el.appendChild(grp);
  }
  if(!hasAny)el.innerHTML=`<div class="section-empty"><div class="section-empty-icon">📭</div><div class="section-empty-text">Nenhum horário disponível nos próximos dias</div></div>`;
}

function openBookModal(dk,slotId){
  const s=DB.slots[dk]&&DB.slots[dk].find(x=>x.id===slotId);if(!s)return;
  pendingBook={dk,slotId};
  const d=new Date(dk+'T12:00:00');
  document.getElementById('bookModalBody').innerHTML=`
    <div class="detail-row"><span class="detail-key">Data</span><span class="detail-val">${fmtDateFull(d)}</span></div>
    <div class="detail-row"><span class="detail-key">Horário</span><span class="detail-val">${s.time}</span></div>
    <div class="detail-row"><span class="detail-key">Treino</span><span class="detail-val">${s.name}</span></div>
    <div class="detail-row"><span class="detail-key">Tipo</span><span class="detail-val"><span class="type-badge tb-${s.type}">${s.type}</span></span></div>
    ${s.type==='clinica'?`<div class="detail-row"><span class="detail-key">Vagas</span><span class="detail-val">${s.vagas-s.booked.length} restante(s)</span></div>`:''}
  `;
  document.getElementById('bookModal').classList.add('open');
}

function confirmBook(){
  if(!pendingBook)return;
  const {dk,slotId}=pendingBook;
  const slots=DB.slots[dk];if(!slots)return;
  const s=slots.find(x=>x.id===slotId);if(!s)return;
  if(s.booked.length>=s.vagas){showToast('Sem vagas disponíveis.');closeModal('bookModal');return;}
  if(s.booked.includes(currentUser.studentId)){showToast('Você já está agendado!');closeModal('bookModal');return;}
  s.booked.push(currentUser.studentId);
  DB.bookings.push({id:uid(),studentId:currentUser.studentId,slotId,dateKey:dk,time:s.time,slotName:s.name,createdAt:new Date().toISOString(),status:'active'});
  save(DB);closeModal('bookModal');pendingBook=null;
  showToast('✅ Agendado com sucesso!');renderStudent();
}

function cancelBooking(bookingId){
  const b=DB.bookings.find(x=>x.id===bookingId);if(!b)return;
  b.status='cancelled';
  // Remove from slot booked list
  const slots=DB.slots[b.dateKey];
  if(slots){const s=slots.find(x=>x.id===b.slotId);if(s)s.booked=s.booked.filter(id=>id!==currentUser.studentId);}
  save(DB);showToast('Agendamento cancelado.');renderStudent();
}

function renderHistory(){
  const el=document.getElementById('histList');
  const myBookings=DB.bookings.filter(b=>b.studentId===currentUser.studentId);
  if(!myBookings.length){el.innerHTML=`<div class="section-empty"><div class="section-empty-icon">📋</div><div class="section-empty-text">Nenhum treino registrado ainda</div></div>`;return;}
  myBookings.sort((a,b)=>b.createdAt.localeCompare(a.createdAt));
  el.innerHTML=myBookings.map(b=>{
    const d=new Date(b.dateKey+'T12:00:00');
    return `<div class="hist-item">
      <div class="hist-date">${fmtDate(d)}</div>
      <div class="hist-info"><div class="hist-name">${b.slotName}</div><div class="hist-meta">${b.time}</div></div>
      <div class="hist-status ${b.status==='active'?'hist-done':'hist-cancel'}">${b.status==='active'?'Ativo':'Cancelado'}</div>
    </div>`;
  }).join('');
}
